name: Azure CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Python files
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: |
          python -m py_compile streamlit_app.py alpha_tuner.py worldquant_api_starter.py

      - name: Sanity check Azure identity variables
        run: |
          test -n "${{ vars.AZURE_CLIENT_ID }}" || (echo "Missing repo variable AZURE_CLIENT_ID" && exit 1)
          test -n "${{ vars.AZURE_TENANT_ID }}" || (echo "Missing repo variable AZURE_TENANT_ID" && exit 1)
          test -n "${{ vars.AZURE_SUBSCRIPTION_ID }}" || (echo "Missing repo variable AZURE_SUBSCRIPTION_ID" && exit 1)

      - name: Show Azure identity being used
        run: |
          echo "AZURE_CLIENT_ID=${{ vars.AZURE_CLIENT_ID }}"
          echo "AZURE_TENANT_ID=${{ vars.AZURE_TENANT_ID }}"
          echo "AZURE_SUBSCRIPTION_ID=${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Normalize subscription id
        id: sub
        run: |
          SUB_RAW='${{ vars.AZURE_SUBSCRIPTION_ID }}'
          SUB="$(echo "$SUB_RAW" | tr -d '\r\n\t ' )"
          echo "SUB=$SUB" >> $GITHUB_OUTPUT
          echo "Using normalized subscription id: $SUB"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Verify target subscription access
        run: |
          SUB="${{ steps.sub.outputs.SUB }}"
          az account show --subscription "$SUB" --query "{name:name,id:id,tenantId:tenantId}" -o json || {
            echo "Subscription check failed for '$SUB'. Continuing to resource-level commands with explicit --subscription."
            echo "If later steps fail with authorization/subscription errors, re-check AZURE_SUBSCRIPTION_ID and role assignments."
          }

      - name: Resolve deployment variables
        id: vars
        run: |
          echo "RG=${{ vars.AZURE_RESOURCE_GROUP }}" >> $GITHUB_OUTPUT
          echo "APP=${{ vars.AZURE_WEBAPP_NAME }}" >> $GITHUB_OUTPUT
          echo "ACR=${{ vars.AZURE_CONTAINER_REGISTRY }}" >> $GITHUB_OUTPUT
          echo "IMG=${{ vars.AZURE_IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Sanity check required variables
        run: |
          test -n "${{ steps.vars.outputs.RG }}" || (echo "Missing repo variable AZURE_RESOURCE_GROUP" && exit 1)
          test -n "${{ steps.vars.outputs.APP }}" || (echo "Missing repo variable AZURE_WEBAPP_NAME" && exit 1)
          test -n "${{ steps.vars.outputs.ACR }}" || (echo "Missing repo variable AZURE_CONTAINER_REGISTRY" && exit 1)
          test -n "${{ steps.vars.outputs.IMG }}" || (echo "Missing repo variable AZURE_IMAGE_NAME" && exit 1)

      - name: Login to ACR
        run: az acr login --subscription "${{ steps.sub.outputs.SUB }}" --name "${{ steps.vars.outputs.ACR }}"

      - name: Build and push image
        run: |
          IMAGE="${{ steps.vars.outputs.ACR }}.azurecr.io/${{ steps.vars.outputs.IMG }}:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Ensure managed identity and AcrPull
        run: |
          APP_ID=$(az webapp identity assign --subscription "${{ steps.sub.outputs.SUB }}" -g "${{ steps.vars.outputs.RG }}" -n "${{ steps.vars.outputs.APP }}" --query principalId -o tsv)
          ACR_ID=$(az acr show --subscription "${{ steps.sub.outputs.SUB }}" -g "${{ steps.vars.outputs.RG }}" -n "${{ steps.vars.outputs.ACR }}" --query id -o tsv)
          az role assignment create --subscription "${{ steps.sub.outputs.SUB }}" --assignee "$APP_ID" --scope "$ACR_ID" --role AcrPull || true

      - name: Configure web app container
        run: |
          az webapp config container set \
            --subscription "${{ steps.sub.outputs.SUB }}" \
            -g "${{ steps.vars.outputs.RG }}" \
            -n "${{ steps.vars.outputs.APP }}" \
            --container-image-name "$IMAGE" \
            --container-registry-url "https://${{ steps.vars.outputs.ACR }}.azurecr.io"

      - name: Configure required app settings
        run: |
          az webapp config appsettings set \
            --subscription "${{ steps.sub.outputs.SUB }}" \
            -g "${{ steps.vars.outputs.RG }}" \
            -n "${{ steps.vars.outputs.APP }}" \
            --settings \
              WEBSITES_PORT=8000 \
              WQ_BASE_URL="${{ secrets.WQ_BASE_URL }}" \
              WQ_EMAIL="${{ secrets.WQ_EMAIL }}" \
              WQ_PASSWORD="${{ secrets.WQ_PASSWORD }}" \
              WQ_AUTH_PATH="${{ secrets.WQ_AUTH_PATH }}" \
              WQ_AUTH_CHECK_PATH="${{ secrets.WQ_AUTH_CHECK_PATH }}" \
              WQ_SIMULATIONS_PATH="${{ secrets.WQ_SIMULATIONS_PATH }}" \
              WQ_SIMULATION_RESULT_TEMPLATE="${{ secrets.WQ_SIMULATION_RESULT_TEMPLATE }}" \
              WQ_ALPHA_RESULT_TEMPLATE="${{ secrets.WQ_ALPHA_RESULT_TEMPLATE }}"

      - name: Restart web app
        run: az webapp restart --subscription "${{ steps.sub.outputs.SUB }}" -g "${{ steps.vars.outputs.RG }}" -n "${{ steps.vars.outputs.APP }}"

      - name: Show app URL
        run: |
          URL=$(az webapp show --subscription "${{ steps.sub.outputs.SUB }}" -g "${{ steps.vars.outputs.RG }}" -n "${{ steps.vars.outputs.APP }}" --query defaultHostName -o tsv)
          echo "Deployed to: https://$URL"
